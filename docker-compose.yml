services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: qr_ticket
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-qrticket}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d qr_ticket"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/qr_ticket
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-qrticket}
      SPRING_PROFILES_ACTIVE: prod
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata: